<!DOCTYPE html>
<html>
<head>
  <title>Game Center LIVE POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 GAME CENTER LIVE POS</h1>

<div>
  <h3>Admin Panel</h3>

  <input id="rate" placeholder="Rate per 10 min">
  <button onclick="setRate()">Set Rate</button>

  <button onclick="toggleDailyReportPanel()">📅 Daily Report</button>

  <div id="dailyReportPanel" style="display:none; margin-top:10px;">
    <div id="dailyReport"></div>
  </div>

<button onclick="toggleStationReportPanel()">🎮 Station Report</button>

<div id="stationReportPanel" style="display:none; margin-top:10px;">
  <div id="stationReport"></div>
</div>
</div>
<hr>

<input id="station" placeholder="Station">
<input id="duration" placeholder="Minutes">
<button onclick="startSession()">Start</button>

<h3 id="income">Income: ₦0</h3>


<hr>

<table border="1">
  <thead>
    <tr>
      <th>Receipt</th>
      <th>Station</th>
      <th>Start</th>
      <th>End</th>
      <th>Date</th>
      <th>Status</th>
      <th>Countdown</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="sessions"></tbody>
</table>

<script src="renderer.js"></script>
</body>
</html>
