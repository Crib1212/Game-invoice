<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Center LIVE POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 GAME CENTER LIVE POS</h1>

<div>
  <h3>Admin Panel</h3>

<div class="rate-box">

  <input id="rate" type="number" placeholder="Enter rate (₦)" />

  <label for="rateType">Rate Type:</label>
  <select id="rateType">
    <option value="1">Per 1 min</option>
    <option value="7">Per 7 min</option>
    <option value="10" selected>Per 10 min</option>
    <option value="20">Per 20 min</option>
  </select>

  <button onclick="setRate()">💾 Set rate</button>
  <div id="msgBox"></div>

</div>

<button onclick="toggleDailyReportPanel()">📅 Daily Report</button>
<div id="dailyReportPanel" class="hidden-panel"></div>

<button onclick="toggleStationReportPanel()">🎮 Today's Report</button>

<div id="stationReportPanel" class="hidden-panel">
  <div id="stationReport"></div>
</div>
</div>
<hr>

<input id="station" placeholder="Station">
<input id="duration" placeholder="Minutes">
<button onclick="startSession()">Start</button>

<h3 id="income">Income: ₦0</h3>


<hr>

<table border="1">
  <thead>
    <tr>
      <th>Receipt</th>
      <th>Station</th>
      <th>Start</th>
      <th>End</th>
      <th>Date</th>
      <th>Status</th>
      <th>Countdown</th>
      <th>Action</th>
    </tr>
  </thead>

<tbody id="sessions"></tbody>
</table>

<!-- ================= RENDERER ================= -->
<script src="renderer.js"></script>

</body>
</html>
