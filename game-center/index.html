<!DOCTYPE html>
<html>
<head>
  <title>Game Center POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 GAME CENTER POS</h1>

<h3>Game Session</h3>

<input id="station" placeholder="Station">
<input id="pricePerGame" type="number" placeholder="Price per Game (₦)">
<input id="gameMinutes" type="number" placeholder="Game Minutes">
<input id="customerMinutes" type="number" placeholder="Customer Minutes">

<button onclick="startSession()">Start Session</button>

<h3 id="income">Income: ₦0</h3>

<hr>

<h3>Purchase</h3>

<input id="customerName" placeholder="Customer Name">
<input id="itemName" placeholder="Item">
<input id="purchasePrice" type="number" placeholder="Price">
<input id="qty" type="number" value="1">

<button onclick="addPurchase()">Add Purchase</button>

<hr>

<button onclick="toggleSummary()">📊 Summary</button>
<div id="summaryPanel" style="display:none; background:#111; padding:10px;"></div>

<button onclick="toggleReport()">📄 Invoice Report</button>
<div id="reportPanel" style="display:none; background:#111; padding:10px;"></div>

<hr>

<table border="1">
  <thead>
    <tr>
      <th>Receipt</th>
      <th>Type</th>
      <th>Customer/Station</th>
      <th>Start</th>
      <th>End</th>
      <th>Date</th>
      <th>Status</th>
      <th>Countdown</th>
      <th>Amount</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<script src="renderer.js"></script>
</body>
</html>
