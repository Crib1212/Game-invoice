<!DOCTYPE html>
<html>
<head>
  <title>Game Center LIVE POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<div id="app" style="display:none;">

  <h1>🎮 GAME CENTER LIVE POS</h1>

  <div id="adminPanel" style="display:none;">
    <h3>Admin Panel</h3>
    <input id="rate" placeholder="Rate per 5 min">
    <div id="stationReport"></div>
<button onclick="getStationSummary()">Refresh Station Report</button>
    <button onclick="setRate()">Set Rate</button>
  </div>

  <hr>

  <input id="station" placeholder="Station">
  <input id="duration" placeholder="Minutes">
  <button onclick="startSession()">Start</button>

  <h3 id="income">Income: ₦0</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Receipt</th>
        <th>Station</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="sessions"></tbody>
  </table>

</div>

<script src="renderer.js"></script>
</body>
</html>
