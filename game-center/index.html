<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Game Center LIVE POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 GAME CENTER LIVE POS</h1>

<!-- ================= ADMIN PANEL ================= -->
<div>
  <h3>Admin Panel</h3>

  <div class="rate-box">

    <input id="rate" type="number" placeholder="Enter rate (₦)" />

    <select id="rateType">
      <option value="1">Per 1 min</option>
      <option value="7">Per 7 min</option>
      <option value="10" selected>Per 10 min</option>
      <option value="20">Per 20 min</option>
    </select>

    <button onclick="setRate()">💾 Set rate</button>

    <div id="msgBox" style="margin-top:10px;color:lime;font-weight:bold;"></div>
  </div>

  <button onclick="toggleDailyReportPanel()">📅 Daily Report</button>

  <div id="dailyReportPanel" style="display:none; margin-top:10px;">
    <div id="dailyReport"></div>
  </div>

  <button onclick="toggleStationReportPanel()">🎮 Station Report</button>

  <div id="stationReportPanel" style="display:none; margin-top:10px;">
    <div id="stationReport"></div>
  </div>
</div>

<hr>

<!-- ================= SESSION INPUT ================= -->
<input id="station" placeholder="Station (e.g PC1)">
<input id="duration" type="number" placeholder="Minutes">

<button onclick="startSession()">Start Session</button>

<h3 id="income">Income: ₦0</h3>

<hr>

<!-- ================= TABLE ================= -->
<table border="1" width="100%">
  <thead>
    <tr>
      <th>Receipt</th>
      <th>Station</th>
      <th>Start</th>
      <th>End</th>
      <th>Date</th>
      <th>Status</th>
      <th>Countdown</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="sessions"></tbody>
</table>

<!-- ================= RENDERER ================= -->
<script src="renderer.js"></script>

</body>
</html>
